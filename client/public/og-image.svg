<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D1117"/>

  <!-- Glow blob behind logo -->
  <ellipse cx="600" cy="260" rx="280" ry="200" fill="#39FF14" opacity="0.07" filter="url(#softblur)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#4ade80" opacity="0.9"/>

  <!-- Logo image centered -->
  <image href="/cashout-icon.png" x="490" y="80" width="220" height="220" preserveAspectRatio="xMidYMid meet"/>

  <!-- CASHOUT text -->
  <text x="600" y="375" font-family="Arial Black, Impact, sans-serif" font-size="80" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">CASHOUT</text>

  <!-- Tagline -->
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="24" fill="#4ade80" text-anchor="middle" letter-spacing="5" opacity="0.85">AI-POWERED SHARP PICKS</text>

  <!-- Divider -->
  <rect x="520" y="458" width="160" height="1" fill="#4ade80" opacity="0.3"/>

  <!-- Domain -->
  <text x="600" y="490" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle" letter-spacing="2" opacity="0.4">cashout.inc</text>

  <!-- Bottom accent -->
  <rect x="0" y="627" width="1200" height="3" fill="#4ade80" opacity="0.3"/>
</svg>
