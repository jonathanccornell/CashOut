<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BEFF5A"/>
      <stop offset="45%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Top bar extending left -->
    <rect x="4" y="8" width="36" height="10" rx="2" fill="url(#g)"/>
    <!-- Top vertical stub -->
    <rect x="27" y="2" width="10" height="10" rx="2" fill="url(#g)"/>
    <!-- Upper curve body -->
    <rect x="22" y="8" width="10" height="22" rx="2" fill="url(#g)"/>
    <!-- Middle connector -->
    <rect x="14" y="26" width="36" height="10" rx="2" fill="url(#g)"/>
    <!-- Lower curve body -->
    <rect x="32" y="32" width="10" height="22" rx="2" fill="url(#g)"/>
    <!-- Bottom bar extending right -->
    <rect x="24" y="46" width="36" height="10" rx="2" fill="url(#g)"/>
    <!-- Bottom vertical stub -->
    <rect x="27" y="52" width="10" height="10" rx="2" fill="url(#g)"/>
  </g>
</svg>
